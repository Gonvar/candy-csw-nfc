name: CandyControl
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""        # <-- set this in Xcode (Signing & Capabilities)
targets:
  CandyControl:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.candycontrol   # <-- change to something unique
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Candy Control
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NFCReaderUsageDescription: "Reads and programs wash cycles on your Candy appliance over NFC."
        com.apple.developer.nfc.readersession.iso7816.select-identifiers:
          - D2760000850101
    entitlements:
      path: Sources/CandyControl.entitlements
      properties:
        com.apple.developer.nfc.readersession.formats:
          - TAG
